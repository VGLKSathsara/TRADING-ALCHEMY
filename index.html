<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Trading Academy — SMC · SNR · Alchemist</title>
    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="shell">
      <!-- Top Navigation Bar -->
      <nav class="topnav">
        <div class="logo">Trading <span>Academy</span></div>
        <div class="course-tabs" id="course-tabs"></div>
        <div class="overall-prog">
          <div class="overall-track">
            <div class="overall-fill" id="overall-fill"></div>
          </div>
          <div class="overall-pct" id="overall-pct">0%</div>
        </div>
      </nav>

      <!-- Main content: sidebar + lesson area -->
      <div class="main">
        <aside class="sidebar">
          <div class="sidebar-inner" id="sidebar"></div>
        </aside>

        <div class="content">
          <div class="lesson-header" id="lesson-header"></div>
          <div id="lesson-area"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
