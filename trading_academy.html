        const c = COURSES[cIdx]

        if (c.modules && l.mod !== undefined) return c.modules[l.mod].bg
        return l.bc || c.color
      }

        const c = COURSES[cIdx]
        const l = c.lessons[activeLessonByCourse[cIdx]]
        if (c.modules && l.mod !== undefined) return c.modules[l.mod].tc
        return l.bt || '#fff'

        if (done) lockQuiz()
